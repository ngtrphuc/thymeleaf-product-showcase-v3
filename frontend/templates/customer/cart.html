<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Smartphone Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="header">
        <a href="/" class="home-animated"><span class="icon-svg icon-home" aria-hidden="true"></span> HOME</a>
        <div class="header-actions">
            <a sec:authorize="!isAuthenticated()" href="/login" class="btn-header header-action header-action--login">
                <span class="header-action__icon header-action__icon--login icon-svg icon-login" aria-hidden="true"></span>
                <span class="header-action__label">Log In</span>
            </a>
            <th:block sec:authorize="isAuthenticated()">
                <a sec:authorize="hasRole('USER')" href="/my-orders" class="btn-header header-action header-action--neutral">
                    <span class="header-action__icon icon-svg icon-orders" aria-hidden="true"></span>
                    <span class="header-action__label">Orders</span>
                </a>
                <a sec:authorize="hasRole('USER')" href="/wishlist" class="btn-header header-action header-action--neutral">
                    <span class="header-action__icon icon-svg icon-wishlist" aria-hidden="true"></span>
                    <span class="header-action__label">Wishlist</span>
                </a>
                <a sec:authorize="hasRole('USER')" href="/compare" class="btn-header header-action header-action--neutral">
                    <span class="header-action__icon icon-svg icon-clipboard" aria-hidden="true"></span>
                    <span class="header-action__label">Compare</span>
                </a>
                <a sec:authorize="!hasRole('ADMIN')" href="/cart" class="btn-header header-action header-action--neutral">
                    <span class="header-action__icon icon-svg icon-cart" aria-hidden="true"></span>
                    <span class="header-action__label">Cart (<span th:text="${session.cartCount != null ? session.cartCount : 0}">0</span>)</span>
                </a>
                <a sec:authorize="hasRole('USER')" th:href="@{/profile}" class="btn-header header-action header-action--profile">
                    <span class="header-action__icon icon-svg icon-user" aria-hidden="true"></span>
                    <span class="header-action__label" sec:authentication="name"></span>
                </a>
                <a sec:authorize="hasRole('ADMIN')" href="/admin" class="btn-header header-action header-action--accent">
                    <span class="header-action__icon icon-svg icon-admin" aria-hidden="true"></span>
                    <span class="header-action__label">Admin</span>
                </a>
                <form th:action="@{/logout}" method="post" style="display:inline;margin:0;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn-logout-link header-action header-action--danger">
                        <span class="header-action__icon icon-svg icon-logout" aria-hidden="true"></span>
                        <span class="header-action__label">Log Out</span>
                    </button>
                </form>
            </th:block>
        </div>
    </div>

    <div class="container">
        <h2 style="padding-bottom:16px; font-family:'Syne',sans-serif; font-weight:700; text-align: center;">Your
            Shopping Cart</h2>

        <table class="cart-table" th:if="${!#lists.isEmpty(cart)}">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cart}">
                    <td th:text="${item.name}" style="font-weight:600;"></td>
                    <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' JPY'"
                        style="color:var(--text-muted);"></td>
                    <td>
                        <form th:action="@{/cart/decrease/{id}(id=${item.id})}" method="post"
                            style="display:inline;margin:0;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="qty-btn" style="cursor:pointer;">&minus;</button>
                        </form>
                        <span th:text="${item.quantity}" style="margin:0 10px;font-weight:600;"></span>
                        <form th:action="@{/cart/increase/{id}(id=${item.id})}" method="post"
                            style="display:inline;margin:0;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="qty-btn" style="cursor:pointer;">+</button>
                        </form>
                    </td>
                    <td th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' JPY'"
                        style="color:var(--accent);font-weight:700;font-family:'Syne',sans-serif;"></td>
                    <td>
                        <form th:action="@{/cart/remove/{id}(id=${item.id})}" method="post"
                            style="display:inline;margin:0;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn-remove" style="cursor:pointer;">&times;</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(cart)}"
            style="text-align:center;padding:80px 20px;display:flex;flex-direction:column;align-items:center;gap:20px;">
            <div style="font-size:60px;opacity:0.4;"><span class="icon-svg icon-cart" aria-hidden="true"></span></div>
            <h3 style="font-size:1.3rem;color:var(--text-muted);font-weight:500;">Your bag is empty!</h3>
            <p style="color:var(--text-muted);font-size:14px;">Looks like you haven't added anything yet.</p>
            <a href="/" class="btn-checkout" style="padding:12px 36px;">GO SHOPPING</a>
        </div>

        <div th:if="${!#lists.isEmpty(cart)}" style="text-align:right;margin-top:28px;">
            <p style="font-size:22px;font-weight:700;font-family:'Syne',sans-serif;margin-bottom:16px;">
                Total: <span th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')}"
                    style="color:var(--accent);"></span> JPY
            </p>
            <div style="display:flex;justify-content:flex-end;gap:10px;">
                <a href="/" class="btn-back">KEEP SHOPPING</a>
                <a href="/cart/payment" class="btn-checkout">BUY NOW</a>
            </div>
        </div>
    </div>

    <div class="toast-container" th:if="${toast}">
        <div class="toast" th:text="${toast}"></div>
    </div>
    <script>
        setTimeout(() => { document.querySelectorAll('.toast').forEach(t => t.remove()); }, 3200);
    </script>

    <footer>
        <div th:text="${shopname}"
            style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:2px;"></div>
        <div class="footer-address" th:text="${address}"></div>
    </footer>
    <div th:replace="~{fragments/compare-bar :: compareBar}"></div>
    <div th:replace="~{fragments/chat-widget :: chatWidget}"></div>
</body>

</html>
