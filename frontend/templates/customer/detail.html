<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Smartphone Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="header">
        <a href="/" class="home-animated"><span class="icon-svg icon-home" aria-hidden="true"></span> HOME</a>
        <div class="header-actions">
            <a sec:authorize="!isAuthenticated()" href="/login" class="btn-header header-action header-action--login">
                <span class="header-action__icon header-action__icon--login icon-svg icon-login" aria-hidden="true"></span>
                <span class="header-action__label">Log In</span>
            </a>
            <th:block sec:authorize="isAuthenticated()">
                <a sec:authorize="hasRole('USER')" href="/my-orders" class="btn-header header-action header-action--neutral">
                    <span class="header-action__icon icon-svg icon-orders" aria-hidden="true"></span>
                    <span class="header-action__label">Orders</span>
                </a>
                <a sec:authorize="hasRole('USER')" href="/wishlist" class="btn-header header-action header-action--neutral">
                    <span class="header-action__icon icon-svg icon-wishlist" aria-hidden="true"></span>
                    <span class="header-action__label">Wishlist</span>
                </a>
                <a sec:authorize="hasRole('USER')" href="/compare" class="btn-header header-action header-action--neutral">
                    <span class="header-action__icon icon-svg icon-clipboard" aria-hidden="true"></span>
                    <span class="header-action__label">Compare</span>
                </a>
                <a sec:authorize="!hasRole('ADMIN')" href="/cart" class="btn-header header-action header-action--neutral">
                    <span class="header-action__icon icon-svg icon-cart" aria-hidden="true"></span>
                    <span class="header-action__label">Cart (<span th:text="${session.cartCount != null ? session.cartCount : 0}">0</span>)</span>
                </a>
                <a sec:authorize="hasRole('USER')" th:href="@{/profile}" class="btn-header header-action header-action--profile">
                    <span class="header-action__icon icon-svg icon-user" aria-hidden="true"></span>
                    <span class="header-action__label" sec:authentication="name"></span>
                </a>
                <a sec:authorize="hasRole('ADMIN')" href="/admin" class="btn-header header-action header-action--accent">
                    <span class="header-action__icon icon-svg icon-admin" aria-hidden="true"></span>
                    <span class="header-action__label">Admin</span>
                </a>
                <form th:action="@{/logout}" method="post" style="display:inline;margin:0;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn-logout-link header-action header-action--danger">
                        <span class="header-action__icon icon-svg icon-logout" aria-hidden="true"></span>
                        <span class="header-action__label">Log Out</span>
                    </button>
                </form>
            </th:block>
        </div>
    </div>

    <div class="container detail-wrapper">
        <div class="detail-image-section">
            <img th:src="@{${product.imageUrl}}" th:alt="${product.name}">
        </div>

        <div class="detail-info-section">
            <h1 class="detail-title" th:text="${product.name}"></h1>
            <p class="price detail-price" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' JPY'"></p>
            <p class="detail-description" th:text="${product.description}"></p>

            <h3 class="detail-spec-title">Product Specifications</h3>
            <table class="spec-table">
                <tr><td class="spec-label">OS</td><td class="spec-value" th:text="${product.os}"></td></tr>
                <tr><td class="spec-label">Chipset</td><td class="spec-value" th:text="${product.chipset}"></td></tr>
                <tr><td class="spec-label">Frequency</td><td class="spec-value" th:text="${product.speed}"></td></tr>
                <tr><td class="spec-label">RAM</td><td class="spec-value" th:text="${product.ram}"></td></tr>
                <tr><td class="spec-label">Storage</td><td class="spec-value" th:text="${product.storage}"></td></tr>
                <tr><td class="spec-label">Display Size</td><td class="spec-value" th:text="${product.size}"></td></tr>
                <tr><td class="spec-label">Resolution</td><td class="spec-value" th:text="${product.resolution}"></td></tr>
                <tr><td class="spec-label">Battery</td><td class="spec-value" th:text="${product.battery}"></td></tr>
                <tr><td class="spec-label">Charging</td><td class="spec-value" th:text="${product.charging}"></td></tr>
            </table>

            <div class="action-buttons">
                <div sec:authorize="hasRole('USER')" class="detail-primary-actions">
                    <form action="/cart/add" method="post" class="detail-cart-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="id" th:value="${product.id}">
                        <div class="detail-split-actions">
                            <button type="submit" name="mode" value="cart"
                                class="btn-cart detail-action-btn detail-split-btn detail-split-btn--left"><span class="detail-split-btn__label detail-invert-label">Add to Cart</span></button>
                            <button type="submit" name="mode" value="buy"
                                class="btn-cart detail-action-btn detail-split-btn detail-split-btn--right"><span class="detail-split-btn__label detail-invert-label">Buy Now</span></button>
                        </div>
                        <div class="detail-qty-row">
                            <span class="detail-qty-label">Quantity</span>
                            <div class="detail-qty-control-wrap">
                                <div class="detail-qty-control">
                                    <button type="button" class="detail-qty-btn detail-qty-btn--left" data-qty-action="decrease" aria-label="Decrease quantity"><span class="detail-qty-symbol">-</span></button>
                                    <input type="number" name="quantity" value="1" min="1"
                                        th:attr="max=${product.stock != null and product.stock > 0 ? product.stock : 1}"
                                        class="detail-qty-input" aria-label="Quantity">
                                    <button type="button" class="detail-qty-btn detail-qty-btn--right" data-qty-action="increase" aria-label="Increase quantity"><span class="detail-qty-symbol">+</span></button>
                                </div>
                                <span class="detail-qty-feedback" aria-hidden="true"></span>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="detail-secondary-actions">
                    <form sec:authorize="hasRole('USER')" method="post"
                        th:action="${wishlisted} ? @{/wishlist/remove} : @{/wishlist/add}"
                        class="detail-wishlist-compare-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="id" th:value="${product.id}">
                        <input type="hidden" name="redirect" th:value="@{/product/{id}(id=${product.id})}">
                        <div class="detail-split-actions">
                            <button type="submit"
                                th:formaction="${wishlisted} ? @{/wishlist/remove} : @{/wishlist/add}"
                                class="btn-cart detail-action-btn detail-split-btn detail-split-btn--left">
                                <span class="detail-split-btn__label detail-invert-label"
                                    th:text="${wishlisted} ? 'Remove Wishlist' : 'Add Wishlist'"></span>
                            </button>
                            <button type="submit"
                                th:formaction="@{/compare/add}"
                                class="btn-cart detail-action-btn detail-split-btn detail-split-btn--right">
                                <span class="detail-split-btn__label detail-invert-label">Compare</span>
                            </button>
                        </div>
                    </form>
                    <a sec:authorize="hasRole('USER')" th:href="${backUrl}" class="btn-back detail-action-btn detail-invert-fill detail-invert-fill--right"><span class="detail-invert-label">Back</span></a>

                    <div sec:authorize="hasRole('ADMIN')" class="detail-admin-actions">
                        <form action="/compare/add" method="post" class="detail-admin-actions__item">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="id" th:value="${product.id}">
                            <input type="hidden" name="redirect" th:value="@{/product/{id}(id=${product.id})}">
                            <button type="submit" class="btn-save detail-action-btn detail-invert-fill detail-invert-fill--left">
                                <span class="detail-invert-label">Compare</span>
                            </button>
                        </form>
                        <a th:href="@{/admin/products/edit/{id}(id=${product.id}, returnUrl=${'/product/' + product.id})}"
                            class="btn-cart detail-action-btn detail-invert-fill detail-invert-fill--left detail-admin-actions__item">
                            <span class="detail-invert-label">Edit Product</span>
                        </a>
                        <a th:href="${backUrl}"
                            class="btn-back detail-action-btn detail-invert-fill detail-invert-fill--right detail-admin-actions__item">
                            <span class="detail-invert-label">Back</span>
                        </a>
                    </div>

                    <th:block sec:authorize="!hasRole('USER') and !hasRole('ADMIN')">
                        <form action="/compare/add" method="post" style="margin:0;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="id" th:value="${product.id}">
                            <input type="hidden" name="redirect" th:value="@{/product/{id}(id=${product.id})}">
                            <button type="submit" class="btn-save detail-action-btn detail-invert-fill detail-invert-fill--left">
                                <span class="detail-invert-label">Compare</span>
                            </button>
                        </form>
                        <a th:href="${backUrl}" class="btn-back detail-action-btn detail-invert-fill detail-invert-fill--right"><span class="detail-invert-label">Back</span></a>
                    </th:block>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" th:if="${toast}">
        <div class="toast" th:text="${toast}"></div>
    </div>
    <script>
        setTimeout(() => { document.querySelectorAll('.toast').forEach(t => t.remove()); }, 3200);

        document.querySelectorAll('.detail-cart-form').forEach((form) => {
            const input = form.querySelector('.detail-qty-input');
            if (!input) return;

            const min = Number(input.min) || 1;
            const maxAttr = Number(input.max);
            const max = Number.isFinite(maxAttr) && maxAttr > 0 ? maxAttr : Number.MAX_SAFE_INTEGER;

            const normalize = (value) => {
                if (!Number.isFinite(value)) return min;
                return Math.min(max, Math.max(min, value));
            };

            const setValue = (value) => {
                input.value = String(normalize(value));
            };

            const feedback = form.querySelector('.detail-qty-feedback');
            const showFeedback = (delta) => {
                if (!feedback || !delta) return;
                feedback.textContent = delta > 0 ? `+${delta}` : String(delta);
                feedback.classList.remove('detail-qty-feedback--increase', 'detail-qty-feedback--decrease');
                feedback.classList.add(delta > 0 ? 'detail-qty-feedback--increase' : 'detail-qty-feedback--decrease');
                feedback.classList.remove('is-visible');
                void feedback.offsetWidth;
                feedback.classList.add('is-visible');
            };

            form.querySelectorAll('.detail-qty-btn').forEach((button) => {
                button.addEventListener('click', () => {
                    const current = normalize(Number(input.value));
                    const next = button.dataset.qtyAction === 'decrease'
                        ? current - 1
                        : current + 1;
                    const nextValue = normalize(next);
                    setValue(nextValue);
                    showFeedback(nextValue - current);
                });
            });

            input.addEventListener('change', () => setValue(Number(input.value)));
        });

        document.querySelectorAll('.detail-action-btn.detail-invert-fill').forEach((button) => {
            const clearLeaving = () => button.classList.remove('is-leaving');

            button.addEventListener('mouseenter', () => {
                clearLeaving();
                button.classList.add('is-active');
            });

            button.addEventListener('focus', () => {
                clearLeaving();
                button.classList.add('is-active');
            });

            const startLeave = () => {
                button.classList.remove('is-active');
                button.classList.add('is-leaving');
            };

            button.addEventListener('mouseleave', startLeave);
            button.addEventListener('blur', startLeave);

            button.addEventListener('animationend', (event) => {
                if (event.animationName === 'detailCenterOutDark') {
                    clearLeaving();
                }
            });
        });
    </script>

    <footer th:replace="~{fragments/footer :: customerFooter}"></footer>
    <div th:replace="~{fragments/compare-bar :: compareBar}"></div>
    <div th:replace="~{fragments/chat-widget :: chatWidget}"></div>
</body>
</html>
