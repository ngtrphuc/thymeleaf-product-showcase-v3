<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Select Payment Method</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="header">
        <div class="header-actions">
            <a href="/cart" class="btn-header header-action header-action--neutral header-action--back">
                <span class="header-action__icon icon-svg icon-arrow-left" aria-hidden="true"></span>
                <span class="header-action__label">Back to Cart</span>
            </a>
        </div>
        <span style="color:var(--text-muted);font-size:13px;">Checkout Step 1 of 3</span>
    </div>

    <div class="container" style="max-width:760px;">
        <h2 style="text-align:center;margin-bottom:18px;font-family:'Syne',sans-serif;font-weight:700;">Payment Method</h2>
        <p style="text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:28px;">
            Choose your payment method before entering shipping details.
        </p>

        <form th:action="@{/cart/select-payment}" method="post" id="payment-form"
            style="max-width:560px;margin:0 auto;background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;padding:18px 18px 14px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="savedPaymentMethodId" id="savedPaymentMethodId">
            <input type="hidden" name="paymentType" id="paymentType">

            <div th:if="${!#lists.isEmpty(savedPaymentMethods)}" style="margin-bottom:16px;">
                <div style="font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;">
                    Saved Methods
                </div>
                <label th:each="pm : ${savedPaymentMethods}" class="payment-option-card" th:attr="data-mode='saved',data-id=${pm.id}">
                    <input type="radio" name="paymentChoice" th:value="'saved:' + ${pm.id}">
                    <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;width:100%;">
                        <div>
                            <div style="font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;">
                                <img th:if="${pm.type.name() == 'CASH_ON_DELIVERY'}" th:src="@{/images/cash-on-delivery-icon.svg}" alt="Cash on Delivery"
                                    class="payment-method-icon-inline">
                                <img th:if="${pm.type.name() == 'BANK_TRANSFER'}" th:src="@{/images/bank-transfer-icon.svg}" alt="Bank Transfer"
                                    class="payment-method-icon-inline">
                                <img th:if="${pm.type.name() == 'PAYPAY'}" th:src="@{/images/paypay.png}" alt="PayPay"
                                    class="paypay-icon-inline">
                                <img th:if="${pm.type.name() == 'VISA' or pm.type.name() == 'MASTERCARD'}" th:src="@{/images/mastercard-icon.svg}" alt="MasterCard"
                                    class="payment-method-icon-inline">
                                <span th:text="${pm.displayName}"></span>
                            </div>
                            <div th:if="${pm.detail != null}" style="font-size:12px;color:var(--text-muted);margin-top:2px;" th:text="${pm.detail}"></div>
                        </div>
                        <span th:if="${pm.default}" style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;border:1px solid var(--glass-border);background:rgba(0,0,0,0.08);">
                            Default
                        </span>
                    </div>
                </label>
                <div style="display:flex;align-items:center;gap:12px;color:var(--text-muted);font-size:12px;margin:12px 0;">
                    <div style="height:1px;background:var(--glass-border);flex:1;"></div>
                    <span>Or choose another method</span>
                    <div style="height:1px;background:var(--glass-border);flex:1;"></div>
                </div>
            </div>

            <div style="font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;">
                Other Methods
            </div>

            <label class="payment-option-card" data-mode="new" data-type="CASH_ON_DELIVERY"
                th:if="${selectedDefaultPaymentType == null or selectedDefaultPaymentType != 'CASH_ON_DELIVERY'}">
                <input type="radio" name="paymentChoice" value="new:CASH_ON_DELIVERY">
                <div>
                    <div style="font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;">
                        <img th:src="@{/images/cash-on-delivery-icon.svg}" alt="Cash on Delivery" class="payment-method-icon-inline">
                        <span>Cash on Delivery</span>
                    </div>
                    <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">Pay when package arrives.</div>
                </div>
            </label>

            <label class="payment-option-card" data-mode="new" data-type="BANK_TRANSFER"
                th:if="${selectedDefaultPaymentType == null or selectedDefaultPaymentType != 'BANK_TRANSFER'}">
                <input type="radio" name="paymentChoice" value="new:BANK_TRANSFER">
                <div>
                    <div style="font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;">
                        <img th:src="@{/images/bank-transfer-icon.svg}" alt="Bank Transfer" class="payment-method-icon-inline">
                        <span>Bank Transfer</span>
                    </div>
                    <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">Provide account details for transfer.</div>
                </div>
            </label>

            <div id="bank-detail-wrap" style="display:none;margin:10px 0 16px;">
                <label for="bank-detail" style="display:block;font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;">
                    Bank Name and Account Number
                </label>
                <input id="bank-detail" name="bankDetail" type="text" maxlength="200"
                    placeholder="e.g. Mizuho Bank - 1234567890"
                    style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--glass-border);background:var(--surface-soft);color:var(--text);">
            </div>

            <label class="payment-option-card" data-mode="new" data-type="PAYPAY"
                th:if="${selectedDefaultPaymentType == null or selectedDefaultPaymentType != 'PAYPAY'}">
                <input type="radio" name="paymentChoice" value="new:PAYPAY">
                <div>
                    <div style="font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;">
                        <img th:src="@{/images/paypay.png}" alt="PayPay" class="paypay-icon-inline">
                        <span>PayPay</span>
                    </div>
                    <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">Complete payment via PayPay after placing order.</div>
                </div>
            </label>

            <label class="payment-option-card" data-mode="new" data-type="MASTERCARD"
                th:if="${selectedDefaultPaymentType == null or selectedDefaultPaymentType != 'MASTERCARD'}">
                <input type="radio" name="paymentChoice" value="new:MASTERCARD">
                <div>
                    <div style="font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;">
                        <img th:src="@{/images/mastercard-icon.svg}" alt="MasterCard" class="payment-method-icon-inline">
                        <span>MasterCard</span>
                    </div>
                    <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">Use your MasterCard for checkout.</div>
                </div>
            </label>

            <button type="submit" id="payment-submit" class="btn-submit" style="width:100%;margin-top:14px;" disabled>
                Continue to Shipping
            </button>
        </form>
    </div>

    <div class="toast-container" th:if="${toast}">
        <div class="toast" th:text="${toast}"></div>
    </div>

    <style>
        .payment-option-card {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 11px 12px;
            margin-bottom: 10px;
            background: var(--surface-soft);
            cursor: pointer;
        }
        .payment-option-card.active {
            border-color: rgba(0, 0, 0, 0.42);
            background: rgba(0, 0, 0, 0.06);
        }
        .payment-option-card input[type="radio"] {
            margin-top: 2px;
            accent-color: var(--accent);
        }
    </style>

    <script>
        const form = document.getElementById('payment-form');
        const submitButton = document.getElementById('payment-submit');
        const savedInput = document.getElementById('savedPaymentMethodId');
        const paymentTypeInput = document.getElementById('paymentType');
        const bankWrap = document.getElementById('bank-detail-wrap');
        const bankInput = document.getElementById('bank-detail');

        function setActiveCard(radio) {
            document.querySelectorAll('.payment-option-card').forEach(card => card.classList.remove('active'));
            const card = radio.closest('.payment-option-card');
            if (card) {
                card.classList.add('active');
            }
        }

        function updateSelection(radio) {
            setActiveCard(radio);
            const value = radio.value;
            bankWrap.style.display = 'none';
            bankInput.required = false;
            savedInput.value = '';
            paymentTypeInput.value = '';

            if (value.startsWith('saved:')) {
                savedInput.value = value.slice(6);
            } else if (value.startsWith('new:')) {
                const type = value.slice(4);
                paymentTypeInput.value = type;
                if (type === 'BANK_TRANSFER') {
                    bankWrap.style.display = 'block';
                    bankInput.required = true;
                }
            }
            submitButton.disabled = false;
        }

        document.querySelectorAll('input[name="paymentChoice"]').forEach(radio => {
            radio.addEventListener('change', () => updateSelection(radio));
        });

        document.querySelectorAll('.payment-option-card').forEach(card => {
            card.addEventListener('click', event => {
                if (event.target instanceof HTMLInputElement && event.target.type === 'radio') {
                    return;
                }
                const radio = card.querySelector('input[name="paymentChoice"]');
                if (radio) {
                    radio.checked = true;
                    updateSelection(radio);
                }
            });
        });

        const defaultSaved = Array.from(document.querySelectorAll('.payment-option-card[data-mode="saved"]'))
            .find(card => card.textContent.includes('Default'));
        if (defaultSaved) {
            const radio = defaultSaved.querySelector('input[name="paymentChoice"]');
            if (radio) {
                radio.checked = true;
                updateSelection(radio);
            }
        }

        form.addEventListener('submit', event => {
            if (submitButton.disabled) {
                event.preventDefault();
            }
        });

        setTimeout(() => document.querySelectorAll('.toast').forEach(t => t.remove()), 3200);
    </script>

    <div th:replace="~{fragments/compare-bar :: compareBar}"></div>
    <div th:replace="~{fragments/chat-widget :: chatWidget}"></div>
</body>
</html>
