# ===== DATASOURCE — đọc từ environment variables =====
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USER}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Prod: KHÔNG dùng update — dùng validate để tránh auto-alter table
spring.jpa.hibernate.ddl-auto=validate

# HikariCP connection pool — quan trọng cho production
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=SmartphoneShopHikariPool

# Prod: ẩn lỗi khỏi user
server.error.include-stacktrace=never
server.error.include-message=never