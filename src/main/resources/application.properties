spring.application.name=smartphone-shop

# Profile mặc định khi chạy local
spring.profiles.active=dev

# JPA chung
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Session
server.servlet.session.timeout=30m

# Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Compression — giảm bandwidth đáng kể cho HTML/CSS/JS
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
server.compression.min-response-size=1024

# Actuator — chỉ expose health (không lộ thông tin nhạy cảm)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=false

# App info (xuất hiện ở /actuator/info)
info.app.name=Smartphone Shop
info.app.version=1.0.0