<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chat Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script defer th:src="@{/js/admin-shell.js}"></script>
    <style>
        .chat-badge {
            display: none;
            background: #ff4d6d;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            font-weight: 700;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            flex-shrink: 0;
        }
        .chat-badge.visible { display: flex; }

        .msg-admin { justify-content: flex-end; }
        .msg-user  { justify-content: flex-start; }
        .bubble-admin, .bubble-user {
            width: fit-content;
            max-width: 72%;
            padding: 10px 14px;
            font-size: 13px;
            line-height: 1.5;
            word-break: break-word;
        }
        .bubble-admin {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            border-radius: 14px 14px 2px 14px;
        }
        .bubble-user {
            background: var(--glass-hover);
            border: 1px solid var(--glass-border);
            color: var(--text);
            border-radius: 14px 14px 14px 2px;
        }
        .conv-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid var(--glass-border);
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            transition: 0.15s;
        }
        .conv-item:hover { background: var(--glass); color: var(--text); }
        .conv-item.active { background: rgba(0,212,255,0.08); color: var(--accent); }
        .conv-info { flex: 1; min-width: 0; }
        .conv-email {
            font-weight: 600;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .conv-unread { font-size: 11px; margin-top: 2px; opacity: 0.6; }
        .conv-unread.has-unread { color: var(--accent); opacity: 1; }
        .conv-badge {
            display: none;
            background: #ff4d6d;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            font-weight: 700;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-left: 8px;
        }
        .conv-badge.visible { display: flex; }
    </style>
</head>
<body>
    <input type="hidden" id="csrf-token" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <input type="hidden" id="csrf-header" th:value="${_csrf.headerName}">

    <div class="admin-layout">
        <div class="sidebar-admin">
            <div class="brand">⚙ Admin Panel</div>
            <a href="/admin" class="admin-nav-link">
                <span class="admin-nav-icon">&#x1F4CA;&#xFE0E;</span>
                <span class="admin-nav-body"><span class="admin-nav-label">Dashboard</span></span>
            </a>
            <a href="/admin/products" class="admin-nav-link">
                <span class="admin-nav-icon admin-nav-icon--svg" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                        <rect x="7" y="2.75" width="10" height="18.5" rx="2.8"></rect>
                        <path d="M10 5.75h4"></path>
                        <path d="M10.25 17.5h3.5"></path>
                        <circle cx="12" cy="19.2" r="0.7" fill="currentColor" stroke="none"></circle>
                    </svg>
                </span>
                <span class="admin-nav-body"><span class="admin-nav-label">Products</span></span>
            </a>
            <a href="/admin/orders" class="admin-nav-link">
                <span class="admin-nav-icon">&#x1F4E6;&#xFE0E;</span>
                <span class="admin-nav-body"><span class="admin-nav-label">Orders</span></span>
            </a>
            <a href="/admin/chat" class="admin-nav-link active">
                <span class="admin-nav-icon">&#x1F4AC;&#xFE0E;</span>
                <span class="admin-nav-body">
                    <span class="admin-nav-label">Chat</span>
                    <span id="admin-chat-badge" class="chat-badge">0</span>
                </span>
            </a>
            <a href="/" style="margin-top:auto;border-top:1px solid var(--glass-border);padding-top:16px;">🏠︎ HOME</a>
        </div>

        <div class="admin-content" style="padding:0;display:flex;height:100vh;overflow:hidden;">
            <div style="width:260px;border-right:1px solid var(--glass-border);display:flex;flex-direction:column;overflow:hidden;">
                <div style="padding:20px 16px 12px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;border-bottom:1px solid var(--glass-border);">
                    Conversations
                </div>
                <div style="overflow-y:auto;flex:1;">
                    <div th:if="${#lists.isEmpty(emails)}"
                        style="padding:20px;color:var(--text-muted);font-size:13px;text-align:center;">
                        No conversations yet.
                    </div>
                    <a th:each="email : ${emails}"
                        th:href="@{/admin/chat/{e}(e=${email})}"
                        class="conv-item"
                        th:classappend="${email == selectedEmail} ? ' active' : ''">
                        <div class="conv-info">
                            <div class="conv-email" th:text="${email}"></div>
                            <div class="conv-unread"
                                th:classappend="${unreadCounts.get(email) > 0} ? ' has-unread' : ''"
                                th:text="${unreadCounts.get(email) > 0} ? ${unreadCounts.get(email)} + ' unread' : 'No unread'">
                            </div>
                        </div>
                        <span class="conv-badge"
                            th:classappend="${unreadCounts.get(email) > 0} ? ' visible' : ''"
                            th:text="${unreadCounts.get(email) > 0} ? ${unreadCounts.get(email)} : ''">
                        </span>
                    </a>
                </div>
            </div>

            <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
                <div th:if="${selectedEmail == null}"
                    style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:14px;">
                    Select a conversation to start chatting.
                </div>

                <th:block th:if="${selectedEmail != null}">
                    <div style="padding:14px 20px;border-bottom:1px solid var(--glass-border);font-weight:600;font-size:14px;font-family:'Syne',sans-serif;">
                        <span th:text="${selectedEmail}"></span>
                    </div>

                    <div id="chat-box"
                        style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;">
                        <div th:each="msg : ${history}"
                            style="display:flex;"
                            th:classappend="${msg.senderRole == 'ADMIN'} ? 'msg-admin' : 'msg-user'">
                            <div th:classappend="${msg.senderRole == 'ADMIN'} ? 'bubble-admin' : 'bubble-user'">
                                <div th:text="${msg.content}"></div>
                                <div th:text="${#temporals.format(msg.createdAt,'HH:mm')}"
                                    style="font-size:10px;opacity:0.65;margin-top:4px;text-align:right;"></div>
                            </div>
                        </div>
                    </div>

                    <div style="padding:14px 20px;border-top:1px solid var(--glass-border);display:flex;gap:10px;">
                        <input id="msg-input" type="text" placeholder="Reply..."
                            style="flex:1;background:var(--glass);border:1px solid var(--glass-border);border-radius:10px;padding:11px 16px;font-size:13px;color:var(--text);outline:none;"
                            onkeydown="if(event.key==='Enter')sendReply()">
                        <button onclick="sendReply()" class="btn-cart"
                            style="padding:11px 20px;font-size:13px;">Send</button>
                    </div>
                </th:block>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const selectedEmail = /*[[${selectedEmail}]]*/ null;
        const chatBox = document.getElementById('chat-box');
        if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;

        function getCsrfToken() {
            return document.getElementById('csrf-token').value;
        }
        function getCsrfHeader() {
            return document.getElementById('csrf-header').value;
        }
        function postWithCsrf(url, body) {
            return fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    [getCsrfHeader()]: getCsrfToken()
                },
                body: body
            });
        }

        const evtSource = new EventSource('/admin/chat/stream');
        evtSource.addEventListener('message', function (e) {
            const msg = JSON.parse(e.data);
            if (msg.userEmail === selectedEmail) {
                appendMessage(msg.content, msg.senderRole, msg.createdAt);
            }
        });

        function appendMessage(content, role, timeStr) {
            if (!chatBox) return;
            const isAdmin = role === 'ADMIN';
            const wrapper = document.createElement('div');
            wrapper.style.display = 'flex';
            wrapper.style.justifyContent = isAdmin ? 'flex-end' : 'flex-start';
            const time = timeStr ? new Date(timeStr).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }) : '';
            const bubble = document.createElement('div');
            bubble.className = isAdmin ? 'bubble-admin' : 'bubble-user';
            bubble.innerHTML = '<div>' + escHtml(content) + '</div>'
                + '<div style="font-size:10px;opacity:0.65;margin-top:4px;text-align:right;">' + time + '</div>';
            wrapper.appendChild(bubble);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendReply() {
            const input = document.getElementById('msg-input');
            const content = input.value.trim();
            if (!content || !selectedEmail) return;
            input.value = '';
            postWithCsrf('/admin/chat/send',
                'userEmail=' + encodeURIComponent(selectedEmail) + '&content=' + encodeURIComponent(content)
            );
        }

        function escHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function pollAdminUnread() {
            fetch('/admin/chat/unread-count')
                .then(r => r.json())
                .then(count => {
                    const badge = document.getElementById('admin-chat-badge');
                    if (!badge) return;
                    if (count > 0) {
                        badge.textContent = count > 99 ? '99+' : count;
                        badge.classList.add('visible');
                    } else {
                        badge.classList.remove('visible');
                    }
                })
                .catch(() => {});
        }
        pollAdminUnread();
        setInterval(pollAdminUnread, 10000);
    </script>
</body>
</html>
