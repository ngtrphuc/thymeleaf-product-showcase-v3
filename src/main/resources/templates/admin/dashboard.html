<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar-admin">
            <div class="brand">⚙ Admin Panel</div>
            <a href="/admin" class="active">📊 Dashboard</a>
            <a href="/admin/products">📱 Products</a>
            <a href="/admin/orders">📦 Orders</a>
            <a href="/" style="margin-top:auto;border-top:1px solid var(--glass-border);padding-top:16px;">🏠︎ HOME</a>
        </div>

        <div class="admin-content">
            <div style="margin-bottom:28px;">
                <h2 style="font-family:'Syne',sans-serif;font-weight:700;font-size:22px;margin-bottom:4px;">Dashboard Overview</h2>
                <p style="color:var(--text-muted);font-size:13px;">Welcome back — here's what's happening.</p>
            </div>

            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Orders</div>
                    <div class="stat-value" th:text="${totalOrders != null ? totalOrders : 0}">0</div>
                </div>
                <div class="stat-card red">
                    <div class="stat-label">Total Revenue</div>
                    <div class="stat-value" th:text="${#numbers.formatDecimal(totalRevenue != null ? totalRevenue : 0, 0, 'COMMA', 0, 'POINT')} + ' ¥'">0 ¥</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Products Sold</div>
                    <div class="stat-value" th:text="${totalItemsSold != null ? totalItemsSold : 0}">0</div>
                </div>
            </div>

            <h3 style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:14px;">Recent Orders</h3>
            <table class="recent-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Customer</th>
                        <th>Total Amount</th>
                        <th>Status</th>
                        <th>Order Date</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${recentOrders == null or #lists.isEmpty(recentOrders)}">
                        <td colspan="5" style="text-align:center; padding: 20px; color: var(--text-muted);">No orders found.</td>
                    </tr>
                    <tr th:each="o : ${recentOrders}">
                        <td style="font-family:'Syne',sans-serif;font-weight:700;" th:text="${o.id}"></td>
                        <td th:text="${o.customerName}"></td>
                        <td style="color:var(--accent);font-weight:700;font-family:'Syne',sans-serif;" th:text="${#numbers.formatDecimal(o.totalAmount != null ? o.totalAmount : 0, 0, 'COMMA', 0, 'POINT')} + ' JPY'"></td>
                        <td><span class="badge" th:classappend="'badge-' + ${o.status}" th:text="${o.status}"></span></td>
                        <td style="color:var(--text-muted);font-size:12px;" th:text="${o.createdAt != null ? #temporals.format(o.createdAt, 'dd/MM/yyyy') : '-'}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="toast-container" th:if="${toast}">
        <div class="toast" th:text="${toast}"></div>
    </div>
    <script>
        setTimeout(() => { document.querySelectorAll('.toast').forEach(t => t.remove()); }, 3200);
    </script>
</body>
</html>
