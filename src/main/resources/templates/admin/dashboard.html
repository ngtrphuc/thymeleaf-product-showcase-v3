<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar-admin {
            width: 220px;
            background: #111;
            padding: 30px 0;
            flex-shrink: 0;
        }

        .sidebar-admin a {
            display: block;
            padding: 13px 24px;
            color: #ccc;
            font-size: 14px;
            transition: 0.2s;
            text-decoration: none;
        }

        .sidebar-admin a:hover,
        .sidebar-admin a.active {
            background: #e84118;
            color: white;
        }

        .sidebar-admin .brand {
            color: white;
            font-weight: bold;
            font-size: 16px;
            padding: 0 24px 20px;
            border-bottom: 1px solid #333;
            margin-bottom: 10px;
        }

        .admin-content {
            flex: 1;
            padding: 30px;
            background: #f5f6fa;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.07);
        }

        .stat-label {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #000;
        }

        .stat-card.red .stat-value {
            color: #e84118;
        }

        .recent-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.07);
        }

        .recent-table th {
            background: #000;
            color: white;
            padding: 12px 16px;
            text-align: left;
            font-size: 13px;
        }

        .recent-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <div class="sidebar-admin">
            <div class="brand">⚙ Admin Panel</div>
            <a href="/admin" class="active">📊 Dashboard</a>
            <a href="/admin/products">📱 Sản phẩm</a>
            <a href="/admin/orders">📦 Đơn hàng</a>
            <a href="/" style="margin-top: auto; border-top: 1px solid #333; margin-top: 20px;">🏠 Về trang chủ</a>
        </div>

        <!-- Content -->
        <div class="admin-content">
            <h2 style="margin-bottom: 24px;">Tổng quan</h2>

            <div class="stat-grid" style="grid-template-columns: repeat(3, 1fr);">
                <div class="stat-card">
                    <div class="stat-label">Tổng đơn hàng</div>
                    <div class="stat-value" th:text="${totalOrders}">0</div>
                </div>
                <div class="stat-card red">
                    <div class="stat-label">Doanh thu</div>
                    <div class="stat-value"
                        th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' ¥'">
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Sản phẩm đã bán</div>
                    <div class="stat-value" th:text="${totalItemsSold}">0</div>
                </div>
            </div>

            <h3 style="margin-bottom: 16px;">Đơn hàng gần đây</h3>
            <table class="recent-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Khách hàng</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th>Ngày đặt</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="o : ${recentOrders}">
                        <td th:text="${o.id}"></td>
                        <td th:text="${o.customerName}"></td>
                        <td th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' JPY'"
                            style="color: #e84118; font-weight: bold;"></td>
                        <td th:text="${o.status}"></td>
                        <td th:text="${#temporals.format(o.createdAt, 'dd/MM/yyyy')}"></td>
                    </tr>
                    <div class="toast-container" th:if="${toast}">
                        <div class="toast" th:text="${toast}"></div>
                    </div>
                    <script>
                        setTimeout(() => {
                            document.querySelectorAll('.toast').forEach(t => t.remove());
                        }, 3200);
                    </script>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
