<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script defer th:src="@{/js/admin-shell.js}"></script>
    <style>
        .chat-badge {
            display: none;
            background: #000000;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            font-weight: 700;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            flex-shrink: 0;
        }
        .chat-badge.visible { display: flex; }
        .order-status-select {
            width: 128px;
            min-width: 128px;
        }
        .order-status-select .custom-select__trigger {
            position: relative;
            justify-content: center;
            padding: 8px 30px 8px 12px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 10px;
        }
        .order-status-select .custom-select__label {
            width: 100%;
            text-align: center;
        }
        .order-status-select .arrow {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            margin-left: 0;
        }
        .order-status-select.open .arrow {
            transform: translateY(-50%) rotate(180deg);
        }
        .order-status-select .custom-options {
            z-index: 220;
        }
        .order-status-select .custom-option {
            text-align: center;
        }
        .order-status-select[data-status="pending"] .custom-select__trigger {
            color: #a16207;
            border-color: rgba(245, 158, 11, 0.48);
            background: rgba(245, 158, 11, 0.12);
        }
        .order-status-select[data-status="processing"] .custom-select__trigger {
            color: #6d28d9;
            border-color: rgba(139, 92, 246, 0.48);
            background: rgba(139, 92, 246, 0.12);
        }
        .order-status-select[data-status="shipped"] .custom-select__trigger {
            color: #166534;
            border-color: rgba(34, 197, 94, 0.45);
            background: rgba(34, 197, 94, 0.12);
        }
        .order-status-select[data-status="delivered"] .custom-select__trigger {
            color: #1d4ed8;
            border-color: rgba(59, 130, 246, 0.45);
            background: rgba(59, 130, 246, 0.12);
        }
        .order-status-select .custom-option[data-value="pending"] { color: #a16207; }
        .order-status-select .custom-option[data-value="processing"] { color: #6d28d9; }
        .order-status-select .custom-option[data-value="shipped"] { color: #166534; }
        .order-status-select .custom-option[data-value="delivered"] { color: #1d4ed8; }
        .order-status-select .custom-option.active[data-value="pending"] {
            background: rgba(245, 158, 11, 0.18);
            color: #a16207;
            font-weight: 700;
        }
        .order-status-select .custom-option.active[data-value="processing"] {
            background: rgba(139, 92, 246, 0.18);
            color: #6d28d9;
            font-weight: 700;
        }
        .order-status-select .custom-option.active[data-value="shipped"] {
            background: rgba(34, 197, 94, 0.18);
            color: #166534;
            font-weight: 700;
        }
        .order-status-select .custom-option.active[data-value="delivered"] {
            background: rgba(59, 130, 246, 0.18);
            color: #1d4ed8;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar-admin">
            <div class="brand">⚙ Admin Panel</div>
            <a href="/admin" class="admin-nav-link">
                <span class="admin-nav-icon">&#x1F4CA;&#xFE0E;</span>
                <span class="admin-nav-body"><span class="admin-nav-label">Dashboard</span></span>
            </a>
            <a href="/admin/products" class="admin-nav-link">
                <span class="admin-nav-icon admin-nav-icon--svg" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                        <rect x="7" y="2.75" width="10" height="18.5" rx="2.8"></rect>
                        <path d="M10 5.75h4"></path>
                        <path d="M10.25 17.5h3.5"></path>
                        <circle cx="12" cy="19.2" r="0.7" fill="currentColor" stroke="none"></circle>
                    </svg>
                </span>
                <span class="admin-nav-body"><span class="admin-nav-label">Products</span></span>
            </a>
            <a href="/admin/orders" class="admin-nav-link active">
                <span class="admin-nav-icon">&#x1F4E6;&#xFE0E;</span>
                <span class="admin-nav-body"><span class="admin-nav-label">Orders</span></span>
            </a>
            <a href="/admin/chat" class="admin-nav-link">
                <span class="admin-nav-icon">&#x1F4AC;&#xFE0E;</span>
                <span class="admin-nav-body">
                    <span class="admin-nav-label">Chat</span>
                    <span id="admin-chat-badge" class="chat-badge">0</span>
                </span>
            </a>
            <a href="/" style="margin-top:auto;border-top:1px solid var(--glass-border);padding-top:16px;">🏠︎ HOME</a>
        </div>

        <div class="admin-content">
            <div style="margin-bottom:28px;">
                <h2 style="font-family:'Syne',sans-serif;font-weight:700;font-size:22px;margin-bottom:4px;">Order Management</h2>
                <p style="color:var(--text-muted);font-size:13px;">
                    Review and update customer order status.
                    <span th:if="${orderCount != null}">
                        Showing page <span th:text="${currentPage + 1}">1</span>
                        of <span th:text="${totalPages > 0 ? totalPages : 1}">1</span>
                        (<span th:text="${orderCount}">0</span> orders)
                    </span>
                </p>
            </div>

            <div th:if="${orders == null or #lists.isEmpty(orders)}"
                style="text-align:center;padding:50px;background:var(--glass-bg);border-radius:16px;border:1px solid var(--glass-border);">
                <p style="color:var(--text-muted);">No orders found in database.</p>
            </div>

            <div th:each="order : ${orders}" class="order-row"
                style="background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:16px;padding:20px;margin-bottom:16px;">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:15px;">
                    <div>
                        <span style="color:var(--accent);font-weight:700;font-family:'Syne',sans-serif;" th:text="'#' + ${order.id}"></span>
                        <span style="color:var(--text-muted);font-size:12px;margin-left:10px;" th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy HH:mm')}"></span>
                        <div style="margin-top:5px;font-weight:600;" th:text="${order.customerName}"></div>
                        <div style="color:var(--text-muted);font-size:13px;">📞 <span th:text="${order.phoneNumber}"></span></div>
                    </div>
                    <div style="text-align:right;">
                        <div th:if="${order.status == 'cancelled'}" class="badge badge-cancelled">
                            ✕ CANCELLED
                        </div>
                        <form th:unless="${order.status == 'cancelled'}" method="post"
                            th:action="@{/admin/orders/{id}/status(id=${order.id})}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="page" th:value="${currentPage}">
                            <div class="custom-select order-status-select">
                                <input type="hidden" name="status" th:value="${order.status}">
                                <div class="custom-select__trigger">
                                    <span class="custom-select__label"
                                        th:text="${order.status == 'pending' ? 'Pending' : (order.status == 'processing' ? 'Processing' : (order.status == 'shipped' ? 'Shipped' : 'Delivered'))}">Pending</span>
                                    <span class="arrow">&#9660;</span>
                                </div>
                                <div class="custom-options">
                                    <div class="custom-option" data-value="pending">Pending</div>
                                    <div class="custom-option" data-value="processing">Processing</div>
                                    <div class="custom-option" data-value="shipped">Shipped</div>
                                    <div class="custom-option" data-value="delivered">Delivered</div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
                <div style="background:rgba(255,255,255,0.03);border-radius:12px;padding:15px;">
                    <div th:each="item : ${order.items}"
                        style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;">
                        <span th:text="${item.productName} + ' × ' + ${item.quantity}"></span>
                        <span style="font-family:'Syne',sans-serif;color:var(--accent);"
                            th:text="${#numbers.formatDecimal(item.price * item.quantity,0,'COMMA',0,'POINT')} + ' JPY'"></span>
                    </div>
                    <div style="border-top:1px solid rgba(255,255,255,0.05);margin-top:10px;padding-top:10px;text-align:right;">
                        <span style="color:var(--text-muted);font-size:12px;">Total Amount:</span>
                        <div style="font-size:18px;font-weight:800;color:var(--accent);font-family:'Syne',sans-serif;"
                            th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' JPY'"></div>
                    </div>
                </div>
                <div style="margin-top:10px;font-size:12px;color:var(--text-muted);">
                    📍 <span th:text="${order.shippingAddress}"></span>
                </div>
            </div>

            <div class="pagination-wrapper" th:if="${totalPages != null and totalPages > 1}"
                th:with="startPage=${T(java.lang.Math).max(0, T(java.lang.Math).min(currentPage - 1, totalPages - 3))}">
                <a th:if="${currentPage > 0}" th:href="@{/admin/orders(page=${currentPage - 1})}">&#8249;</a>
                <span th:unless="${currentPage > 0}" class="disabled">&#8249;</span>

                <th:block th:each="offset : ${#numbers.sequence(0, 2)}" th:with="i=${startPage + offset}">
                    <span th:if="${i >= totalPages}" class="disabled slot-empty">&#160;</span>
                    <span th:if="${i < totalPages and i == currentPage}" class="active" th:text="${i + 1}"></span>
                    <a th:if="${i < totalPages and i != currentPage}"
                        th:href="@{/admin/orders(page=${i})}" th:text="${i + 1}"></a>
                </th:block>

                <a th:if="${currentPage < totalPages - 1}" th:href="@{/admin/orders(page=${currentPage + 1})}">&#8250;</a>
                <span th:unless="${currentPage < totalPages - 1}" class="disabled">&#8250;</span>
            </div>
        </div>
    </div>

    <div class="toast-container" th:if="${toast}">
        <div class="toast" th:text="${toast}"></div>
    </div>
    <script>
        setTimeout(() => document.querySelectorAll('.toast').forEach(t => t.remove()), 3200);

        function initOrderStatusSelects() {
            const statusSelects = Array.from(document.querySelectorAll('.order-status-select'));
            statusSelects.forEach(selectEl => {
                if (selectEl.dataset.selectInited === '1') {
                    return;
                }
                selectEl.dataset.selectInited = '1';

                const form = selectEl.closest('form');
                const hiddenInput = selectEl.querySelector('input[type="hidden"][name="status"]');
                const trigger = selectEl.querySelector('.custom-select__trigger');
                const label = selectEl.querySelector('.custom-select__label');
                const options = Array.from(selectEl.querySelectorAll('.custom-option'));
                if (!form || !hiddenInput || !trigger || !label || !options.length) {
                    return;
                }

                const setValue = (value) => {
                    const normalizedValue = value ?? '';
                    let selected = options.find(option => (option.dataset.value || '') === normalizedValue);
                    if (!selected) selected = options[0];
                    hiddenInput.value = selected.dataset.value || '';
                    label.textContent = selected.textContent.trim();
                    selectEl.dataset.status = hiddenInput.value;
                    options.forEach(option => option.classList.toggle('active', option === selected));
                };
                setValue(hiddenInput.value || '');

                trigger.addEventListener('click', (event) => {
                    event.stopPropagation();
                    const wasOpen = selectEl.classList.contains('open');
                    document.querySelectorAll('.order-status-select.open').forEach(opened => opened.classList.remove('open'));
                    if (!wasOpen) selectEl.classList.add('open');
                });

                options.forEach(option => {
                    option.addEventListener('click', (event) => {
                        event.stopPropagation();
                        setValue(option.dataset.value || '');
                        selectEl.classList.remove('open');
                        form.submit();
                    });
                });
            });
        }

        function initOrderStatusCloseListener() {
            if (document.documentElement.dataset.orderStatusSelectCloseBound === '1') {
                return;
            }
            document.documentElement.dataset.orderStatusSelectCloseBound = '1';
            document.addEventListener('click', (event) => {
                document.querySelectorAll('.order-status-select.open').forEach(selectEl => {
                    if (!selectEl.contains(event.target)) {
                        selectEl.classList.remove('open');
                    }
                });
            });
            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape') {
                    document.querySelectorAll('.order-status-select.open').forEach(selectEl => selectEl.classList.remove('open'));
                }
            });
        }

        function pollAdminUnread() {
            fetch('/admin/chat/unread-count')
                .then(r => r.json())
                .then(count => {
                    const badge = document.getElementById('admin-chat-badge');
                    if (!badge) return;
                    if (count > 0) {
                        badge.textContent = count > 99 ? '99+' : count;
                        badge.classList.add('visible');
                    } else {
                        badge.classList.remove('visible');
                    }
                })
                .catch(() => {});
        }
        initOrderStatusCloseListener();
        initOrderStatusSelects();
        pollAdminUnread();
        setInterval(pollAdminUnread, 10000);
    </script>
</body>
</html>
