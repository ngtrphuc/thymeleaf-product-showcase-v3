<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .chat-badge {
            display: none;
            background: #ff4d6d;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            font-weight: 700;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            flex-shrink: 0;
        }
        .chat-badge.visible { display: flex; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar-admin">
            <div class="brand">⚙ Admin Panel</div>
            <a href="/admin">📊 Dashboard</a>
            <a href="/admin/products">📱 Products</a>
            <a href="/admin/orders" class="active">📦 Orders</a>
            <a href="/admin/chat" style="display:flex;align-items:center;">
                💬 Chat
                <span id="admin-chat-badge" class="chat-badge">0</span>
            </a>
            <a href="/" style="margin-top:auto;border-top:1px solid var(--glass-border);padding-top:16px;">🏠︎ HOME</a>
        </div>

        <div class="admin-content">
            <div style="margin-bottom:28px;">
                <h2 style="font-family:'Syne',sans-serif;font-weight:700;font-size:22px;margin-bottom:4px;">Order Management</h2>
                <p style="color:var(--text-muted);font-size:13px;">Review and update customer order status.</p>
            </div>

            <div th:if="${orders == null or #lists.isEmpty(orders)}"
                style="text-align:center;padding:50px;background:var(--glass-bg);border-radius:16px;border:1px solid var(--glass-border);">
                <p style="color:var(--text-muted);">No orders found in database.</p>
            </div>

            <div th:each="order : ${orders}" class="order-row"
                style="background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:16px;padding:20px;margin-bottom:16px;">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:15px;">
                    <div>
                        <span style="color:var(--accent);font-weight:700;font-family:'Syne',sans-serif;" th:text="'#' + ${order.id}"></span>
                        <span style="color:var(--text-muted);font-size:12px;margin-left:10px;" th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy HH:mm')}"></span>
                        <div style="margin-top:5px;font-weight:600;" th:text="${order.customerName}"></div>
                        <div style="color:var(--text-muted);font-size:13px;">📞 <span th:text="${order.phoneNumber}"></span></div>
                    </div>
                    <div style="text-align:right;">
                        <div th:if="${order.status == 'cancelled'}" class="badge-cancelled"
                            style="padding:6px 12px;border-radius:8px;background:rgba(255,71,87,0.1);color:#ff4757;font-weight:700;font-size:12px;">
                            ✕ CANCELLED
                        </div>
                        <form th:unless="${order.status == 'cancelled'}" method="post"
                            th:action="@{/admin/orders/{id}/status(id=${order.id})}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <select name="status" class="status-sel" onchange="this.form.submit()">
                                <option value="pending"    th:selected="${order.status == 'pending'}">Pending</option>
                                <option value="processing" th:selected="${order.status == 'processing'}">Processing</option>
                                <option value="shipped"    th:selected="${order.status == 'shipped'}">Shipped</option>
                                <option value="delivered"  th:selected="${order.status == 'delivered'}">Delivered</option>
                            </select>
                        </form>
                    </div>
                </div>
                <div style="background:rgba(255,255,255,0.03);border-radius:12px;padding:15px;">
                    <div th:each="item : ${order.items}"
                        style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;">
                        <span th:text="${item.productName} + ' × ' + ${item.quantity}"></span>
                        <span style="font-family:'Syne',sans-serif;color:var(--accent);"
                            th:text="${#numbers.formatDecimal(item.price * item.quantity,0,'COMMA',0,'POINT')} + ' JPY'"></span>
                    </div>
                    <div style="border-top:1px solid rgba(255,255,255,0.05);margin-top:10px;padding-top:10px;text-align:right;">
                        <span style="color:var(--text-muted);font-size:12px;">Total Amount:</span>
                        <div style="font-size:18px;font-weight:800;color:var(--accent);font-family:'Syne',sans-serif;"
                            th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' JPY'"></div>
                    </div>
                </div>
                <div style="margin-top:10px;font-size:12px;color:var(--text-muted);">
                    📍 <span th:text="${order.shippingAddress}"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" th:if="${toast}">
        <div class="toast" th:text="${toast}"></div>
    </div>
    <script>
        setTimeout(() => document.querySelectorAll('.toast').forEach(t => t.remove()), 3200);

        function pollAdminUnread() {
            fetch('/admin/chat/unread-count')
                .then(r => r.json())
                .then(count => {
                    const badge = document.getElementById('admin-chat-badge');
                    if (!badge) return;
                    if (count > 0) {
                        badge.textContent = count > 99 ? '99+' : count;
                        badge.classList.add('visible');
                    } else {
                        badge.classList.remove('visible');
                    }
                })
                .catch(() => {});
        }
        pollAdminUnread();
        setInterval(pollAdminUnread, 10000);
    </script>
</body>
</html>
