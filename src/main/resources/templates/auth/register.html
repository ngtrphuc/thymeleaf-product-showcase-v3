<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="header">
        <a href="/" class="logo">🏠︎ HOME</a>
    </div>

    <div class="auth-box">
        <h2 style="text-align:center;margin-bottom:6px;font-family:'Syne',sans-serif;font-weight:800;">Create Account</h2>
        <p style="text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:28px;">Join Smartphone Shop today</p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form method="post" th:action="@{/register}">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullName" placeholder="John Doe" required minlength="2">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="At least 6 characters" required minlength="6">
            </div>
            <button type="submit" class="btn-auth">Create Account</button>
        </form>

        <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--text-muted);">
            Already have an account? <a href="/login" style="color:var(--accent);font-weight:700;">Log In</a>
        </p>
    </div>

    <footer>
        <div th:text="${shopname}" style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:2px;"></div>
        <div class="footer-address" th:text="${address}"></div>
    </footer>
</body>
</html>
