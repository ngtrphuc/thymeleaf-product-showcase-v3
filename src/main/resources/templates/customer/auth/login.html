<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Log In</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="header">
        <a href="/" class="home-animated">&#x1F3E0;&#xFE0E; HOME</a>
    </div>

    <div class="auth-box">
        <h2 style="text-align:center;margin-bottom:6px;font-family:'Syne',sans-serif;font-weight:800;">Welcome back</h2>
        <p style="text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:28px;">Sign in to your Smartphone Shop account</p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${param.registered}" class="alert alert-success">Registration successful! Please log in.</div>

        <form method="post" th:action="@{/login}">
            <div class="form-group">
                <label><span class="auth-label-icon">&#x2709;&#xFE0E;</span> Email</label>
                <input type="email" name="username" placeholder="abc@gmail.com" required>
            </div>
            <div class="form-group">
                <label><span class="auth-label-icon">&#x1F512;&#xFE0E;</span> Password</label>
                <input type="password" name="password" placeholder="••••••" required>
            </div>
            <button type="submit" class="btn-auth">Log In</button>
        </form>

        <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--text-muted);">
            Don't have an account yet? <a href="/register" style="color:var(--accent);font-weight:700;">Register</a>
        </p>
    </div>

    <footer>
        <div th:text="${shopname}" style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:2px;"></div>
        <div class="footer-address" th:text="${address}"></div>
    </footer>
</body>
</html>
