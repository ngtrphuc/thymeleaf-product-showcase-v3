<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="header">
        <a href="/" class="home-animated">&#x1F3E0;&#xFE0E; HOME</a>
        <div class="header-actions">
            <a sec:authorize="hasRole('USER')" href="/my-orders" class="btn-header header-action header-action--neutral">
                <span class="header-action__icon">&#129534;</span>
                <span class="header-action__label">Orders</span>
            </a>
            <a sec:authorize="!isAuthenticated()" href="/login" class="btn-header header-action">
                <span class="header-action__icon">&#x1F511;</span>
                <span class="header-action__label">Log In</span>
            </a>
            <a sec:authorize="!hasRole('ADMIN')" href="/cart" class="btn-header header-action header-action--neutral">
                <span class="header-action__icon">&#x1F6D2;</span>
                <span class="header-action__label">Cart (<span th:text="${session.cartCount != null ? session.cartCount : 0}">0</span>)</span>
            </a>
            <a sec:authorize="isAuthenticated()" href="/profile" class="btn-header header-action header-action--profile header-action--accent header-action--active">
                <span class="header-action__icon">&#x1F464;</span>
                <span class="header-action__label" sec:authentication="name"></span>
            </a>
            <a sec:authorize="hasRole('ADMIN')" href="/admin" class="btn-header header-action header-action--accent">
                <span class="header-action__icon">&#9881;</span>
                <span class="header-action__label">Admin</span>
            </a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn-logout-link header-action header-action--danger">
                    <span class="header-action__icon">&#x23FB;</span>
                    <span class="header-action__label">Log Out</span>
                </button>
            </form>
        </div>
    </div>

    <div class="profile-layout">
        <h2 style="margin-bottom:20px;font-family:'Syne',sans-serif;font-weight:700;">&#x1F464; My Profile</h2>

        <div class="profile-card">
            <div class="section-title">Account Information</div>
            <form th:action="@{/profile/update}" method="post">
                <div class="info-grid">
                    <div class="info-group">
                        <label>Full Name</label>
                        <input type="text" name="fullName" th:value="${user.fullName}" required minlength="2">
                    </div>
                    <div class="info-group">
                        <label>Email</label>
                        <input type="email" th:value="${user.email}" disabled>
                    </div>
                    <div class="info-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phoneNumber" th:value="${user.phoneNumber}" placeholder="e.g. 08012345678">
                    </div>
                    <div class="info-group full">
                        <label>Default Shipping Address</label>
                        <input type="text" name="defaultAddress" th:value="${user.defaultAddress}" placeholder="Street, City...">
                    </div>
                </div>
                <button type="submit" class="btn-save">Save Changes</button>
            </form>
        </div>

        <div class="profile-card">
            <div class="section-title">&#x1F4E6; Pending Orders</div>
            <div th:if="${#lists.isEmpty(pendingOrders)}" class="empty-msg">No pending orders.</div>
            <div th:each="order : ${pendingOrders}" class="order-row-profile">
                <div>
                    <strong style="font-family:'Syne',sans-serif;" th:text="'#' + ${order.id}"></strong>
                    <span style="color:var(--text-muted);font-size:12px;margin-left:8px;" th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy')}"></span>
                </div>
                <span class="badge" th:classappend="'badge-' + ${order.status}" th:text="${order.status}"></span>
                <span style="color:var(--accent);font-weight:700;font-family:'Syne',sans-serif;" th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' JPY'"></span>
            </div>
        </div>

        <div class="profile-card">
            <div class="section-title">&#9989; Delivered Orders</div>
            <div th:if="${#lists.isEmpty(deliveredOrders)}" class="empty-msg">No delivered orders yet.</div>
            <div th:each="order : ${deliveredOrders}" class="order-row-profile">
                <div>
                    <strong style="font-family:'Syne',sans-serif;" th:text="'#' + ${order.id}"></strong>
                    <span style="color:var(--text-muted);font-size:12px;margin-left:8px;" th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy')}"></span>
                </div>
                <span class="badge badge-delivered">delivered</span>
                <span style="color:var(--accent);font-weight:700;font-family:'Syne',sans-serif;" th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' JPY'"></span>
            </div>
        </div>

        <div class="profile-card">
            <div class="section-title">&#x1F6D2; Items in Cart</div>
            <div th:if="${#lists.isEmpty(cartItems)}" class="empty-msg">Your cart is empty.</div>
            <div th:each="item : ${cartItems}" class="cart-row">
                <span th:text="${item.name}"></span>
                <span style="color:var(--text-muted);">&times;<span th:text="${item.quantity}"></span></span>
                <span style="color:var(--accent);font-weight:700;font-family:'Syne',sans-serif;" th:text="${#numbers.formatDecimal(item.price * item.quantity,0,'COMMA',0,'POINT')} + ' JPY'"></span>
            </div>
            <div th:if="${!#lists.isEmpty(cartItems)}" style="text-align:right;margin-top:14px;">
                <a href="/cart" class="btn-save">Go to Cart &rarr;</a>
            </div>
        </div>
    </div>

    <div class="toast-container" th:if="${toast}">
        <div class="toast" th:text="${toast}"></div>
    </div>
    <script>
        setTimeout(() => { document.querySelectorAll('.toast').forEach(t => t.remove()); }, 3200);
    </script>

    <footer>
        <div th:text="${shopname}" style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:2px;"></div>
        <div class="footer-address" th:text="${address}"></div>
    </footer>
    <div th:replace="~{fragments/chat-widget :: chatWidget}"></div>
</body>
</html>
