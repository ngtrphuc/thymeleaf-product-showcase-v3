<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Smartphone Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="header">
        <a href="/" class="logo">🏠︎ HOME</a>
    </div>

    <div class="success-card">
        <div class="checkmark-circle">✓</div>
        <h1 style="font-family:'Syne',sans-serif;font-weight:800;margin-bottom:12px;">Thank You!</h1>
        <p style="color:var(--text-muted);font-size:14px;line-height:1.7;margin-bottom:28px;">Your order has been placed successfully.<br>We will process it and contact you shortly.</p>
        <a href="/" class="btn-home" style="display:inline-block;">Back to Shop</a>
    </div>

    <script>
        window.onload = function () {
            var duration = 3 * 1000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#000000', '#1a1a1a', '#000000'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#000000', '#1a1a1a', '#000000'] });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        };
    </script>

    <footer>
        <div th:text="${shopname}" style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:2px;"></div>
        <div class="footer-address" th:text="${address}"></div>
    </footer>
    <div th:replace="~{fragments/chat-widget :: chatWidget}"></div>
</body>
</html>
