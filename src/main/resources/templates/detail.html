<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Smartphone Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="header">
        <a href="/" class="logo">🏠︎ HOME</a>
        <div style="display: flex; align-items: center; gap: 15px;">

            <a sec:authorize="!isAuthenticated()" href="/login" class="btn-header">🔑 Log In</a>

            <th:block sec:authorize="isAuthenticated()">

                <a sec:authorize="hasRole('USER')" th:href="@{/profile}" class="btn-header">
                    👤 <span sec:authentication="name"></span>
                </a>

                <a sec:authorize="hasRole('USER')" href="/my-orders" class="btn-header">📋 Orders</a>

                <a sec:authorize="hasRole('ADMIN')" href="/admin" class="btn-header" style="color:#f39c12 !important;">⚙
                    Admin</a>

                <form th:action="@{/logout}" method="post" style="display:inline; margin:0;">
                    <button type="submit" class="btn-header">🚪 Log Out</button>
                </form>
            </th:block>

            <a sec:authorize="!hasRole('ADMIN')" href="/cart" class="btn-header">
                🛒 Cart (<span th:text="${session.cartCount != null ? session.cartCount : 0}">0</span>)
            </a>

        </div>
    </div>

    <div class="container detail-wrapper">

        <div class="detail-image-section">
            <img th:src="@{${product.imageUrl}}" th:alt="${product.name}">
        </div>

        <div class="detail-info-section">
            <h1 class="detail-title" th:text="${product.name}"></h1>
            <p class="price detail-price"
                th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' JPY'">
            </p>

            <p class="detail-description" th:text="${product.description}"></p>

            <h3 class="detail-spec-title">Product specifications</h3>
            <table class="spec-table">
                <tr>
                    <td class="spec-label">OS</td>
                    <td class="spec-value" th:text="${product.os}"></td>
                </tr>
                <tr>
                    <td class="spec-label">CPU</td>
                    <td class="spec-value" th:text="${product.cpu}"></td>
                </tr>
                <tr>
                    <td class="spec-label">Frequency</td>
                    <td class="spec-value" th:text="${product.speed}"></td>
                </tr>
                <tr>
                    <td class="spec-label">RAM</td>
                    <td class="spec-value" th:text="${product.ram}"></td>
                </tr>
                <tr>
                    <td class="spec-label">Storage</td>
                    <td class="spec-value" th:text="${product.storage}"></td>
                </tr>
                <tr>
                    <td class="spec-label">Display Size</td>
                    <td class="spec-value" th:text="${product.size}"></td>
                </tr>
                <tr>
                    <td class="spec-label">Resolution</td>
                    <td class="spec-value" th:text="${product.resolution}"></td>
                </tr>
                <tr>
                    <td class="spec-label">Battery</td>
                    <td class="spec-value" th:text="${product.battery}"></td>
                </tr>
                <tr>
                    <td class="spec-label">Charging</td>
                    <td class="spec-value" th:text="${product.charging}"></td>
                </tr>
            </table>

            <div class="action-buttons">
                <form sec:authorize="!hasRole('ADMIN')" action="/cart/add" method="get" style="margin: 0;">
                    <input type="hidden" name="id" th:value="${product.id}">
                    <button type="submit" class="btn-cart">Add to Cart</button>
                </form>

                <a sec:authorize="hasRole('ADMIN')" th:href="@{'/admin/products/edit/' + ${product.id}}"
                    class="btn-cart" style="background-color: #f39c12; text-decoration: none; text-align: center;">
                    Edit Product
                </a>

                <a href="/" class="btn-back">Back</a>
            </div>
        </div>

    </div>

    <div class="toast-container" th:if="${toast}">
        <div class="toast" th:text="${toast}"></div>
    </div>
    <script>
        setTimeout(() => {
            document.querySelectorAll('.toast').forEach(t => t.remove());
        }, 3200);
    </script>

    <footer>
        <div th:text="${shopname}" style="font-weight: bold; font-size: 20px;"></div>
        <div class="footer-address" th:text="${address}"></div>
    </footer>
</body>

</html>
