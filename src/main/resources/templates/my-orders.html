<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>My Orders</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .order-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.07)
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold
        }

        .badge-pending {
            background: #fef9c3;
            color: #854d0e
        }

        .badge-processing {
            background: #dbeafe;
            color: #1e40af
        }

        .badge-shipped {
            background: #dcfce7;
            color: #166634
        }

        .badge-delivered {
            background: #d1fae5;
            color: #065f46
        }

        .badge-cancelled {
            background: #fee2e2;
            color: #991b1b
        }

        .order-items {
            border-top: 1px solid #f0f0f0;
            padding-top: 12px
        }

        .order-item-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
            color: #555
        }

        .btn-cancel {
            padding: 6px 16px;
            border-radius: 8px;
            border: 2px solid #e84118;
            background: white;
            color: #e84118;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-cancel:hover {
            background: #e84118;
            color: white
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center
        }

        .modal-overlay.active {
            display: flex
        }

        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: modalIn 0.2s ease
        }

        @keyframes modalIn {
            from {
                transform: scale(0.85);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        .modal-icon {
            font-size: 48px;
            margin-bottom: 12px
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px
        }

        .modal-desc {
            font-size: 14px;
            color: #777;
            margin-bottom: 24px;
            line-height: 1.5
        }

        .modal-order-id {
            font-weight: bold;
            color: #e84118;
            background: #fff3f0;
            padding: 6px 16px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 20px
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center
        }

        .btn-modal-cancel {
            padding: 10px 24px;
            border-radius: 10px;
            border: 2px solid #ddd;
            background: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s
        }

        .btn-modal-cancel:hover {
            border-color: #000;
            background: #f5f5f5
        }

        .btn-modal-confirm {
            padding: 10px 24px;
            border-radius: 10px;
            border: none;
            background: #e84118;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s
        }

        .btn-modal-confirm:hover {
            background: #c0392b
        }
    </style>
</head>

<body>
    <div class="header">
        <a href="/" class="logo">🏠︎ HOME</a>
        <div style="display:flex;align-items:center;gap:15px;">
            <a sec:authorize="isAuthenticated()" href="/profile" class="btn-header">
                👤 <span sec:authentication="name"></span>
            </a>
            <a sec:authorize="isAuthenticated()" href="/my-orders" class="btn-header">📋 Orders</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn-header">🚪 Log Out</button>
            </form>
            <a sec:authorize="!isAuthenticated()" href="/login" class="btn-header">🔑 Log In</a>
            <a sec:authorize="hasRole('ADMIN')" href="/admin" class="btn-header" style="color:#f39c12;">⚙ Admin</a>
            <a href="/cart" class="btn-header">
                🛒 Cart (<span th:text="${session.cartCount != null ? session.cartCount : 0}">0</span>)
            </a>
        </div>
    </div>

    <div class="container" style="max-width:800px;">
        <h2 style="margin-bottom:24px;">📋 My Orders</h2>

        <div th:if="${#lists.isEmpty(orders)}" style="text-align:center;padding:60px 0;color:#999;">
            <div style="font-size:50px;">📦</div>
            <p style="margin-top:16px;">You have no orders yet.</p>
            <a href="/" class="btn-checkout" style="display:inline-block;margin-top:16px;padding:12px 30px;">Buy now</a>
        </div>

        <div th:each="order : ${orders}" class="order-card">
            <div class="order-header">
                <div>
                    <strong th:text="'Order #' + ${order.id}"></strong>
                    <span style="color:#999;font-size:13px;margin-left:10px;"
                        th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                </div>
                <div style="display:flex;align-items:center;gap:10px;">
                    <span class="badge" th:classappend="'badge-' + ${order.status}" th:text="${order.status}">
                    </span>
                    <!-- ✅ Chỉ hiện nút Cancel khi pending hoặc processing -->
                    <button th:if="${order.status == 'pending' or order.status == 'processing'}" type="button"
                        class="btn-cancel" th:attr="onclick='openCancelModal(' + ${order.id} + ')'">
                        Cancel
                    </button>
                </div>
            </div>

            <div style="font-size:14px;color:#555;margin-bottom:10px;">
                🏠︎ <span th:text="${order.shippingAddress}"></span>
            </div>

            <div class="order-items">
                <div th:each="item : ${order.items}" class="order-item-row">
                    <span th:text="${item.productName} + ' × ' + ${item.quantity}"></span>
                    <span
                        th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' JPY'"
                        style="color:#e84118;font-weight:bold;"></span>
                </div>
            </div>

            <div style="text-align:right;margin-top:12px;font-size:16px;font-weight:bold;">
                Total: <span style="color:#e84118;"
                    th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' JPY'">
                </span>
            </div>
        </div>
    </div>

    <!-- CANCEL CONFIRM MODAL -->
    <div class="modal-overlay" id="cancelModal">
        <div class="modal-box">
            <div class="modal-icon">⚠️</div>
            <div class="modal-title">Cancel Order?</div>
            <div class="modal-desc">Are you sure you want to cancel this order?<br>Stock will be restored.</div>
            <div class="modal-order-id" id="modalOrderId"></div>
            <div class="modal-actions">
                <button class="btn-modal-cancel" onclick="closeCancelModal()">Keep Order</button>
                <button class="btn-modal-confirm" onclick="confirmCancel()">Yes, Cancel</button>
            </div>
        </div>
    </div>

    <!-- Hidden form để submit POST -->
    <form id="cancelForm" method="post" style="display:none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    </form>

    <!-- Toast -->
    <div class="toast-container" th:if="${toast}">
        <div class="toast" th:text="${toast}"></div>
    </div>

    <footer>
        <div th:text="${shopname}" style="font-weight:bold;font-size:20px;"></div>
        <div class="footer-address" th:text="${address}"></div>
    </footer>

    <script>
        let pendingCancelId = null;

        function openCancelModal(orderId) {
            pendingCancelId = orderId;
            document.getElementById('modalOrderId').textContent = 'Order #' + orderId;
            document.getElementById('cancelModal').classList.add('active');
        }

        function closeCancelModal() {
            pendingCancelId = null;
            document.getElementById('cancelModal').classList.remove('active');
        }

        function confirmCancel() {
            if (!pendingCancelId) return;
            const form = document.getElementById('cancelForm');
            form.action = '/my-orders/' + pendingCancelId + '/cancel';
            form.submit();
        }

        document.getElementById('cancelModal').addEventListener('click', function (e) {
            if (e.target === this) closeCancelModal();
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeCancelModal();
        });

        setTimeout(() => document.querySelectorAll('.toast').forEach(t => t.remove()), 3200);
    </script>
</body>

</html>
