<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Đơn hàng của tôi</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .order-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.07);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .badge-pending {
            background: #fef9c3;
            color: #854d0e;
        }

        .badge-processing {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-shipped {
            background: #dcfce7;
            color: #166534;
        }

        .badge-delivered {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-cancelled {
            background: #fee2e2;
            color: #991b1b;
        }

        .order-items {
            border-top: 1px solid #f0f0f0;
            padding-top: 12px;
        }

        .order-item-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>

<body>
    <div class="header">
        <a href="/" class="logo">🏠︎ HOME</a>
        <a href="/cart" class="cart">🛒</a>
    </div>

    <div class="container" style="max-width: 800px;">
        <h2 style="margin-bottom: 24px;">📋 Đơn hàng của tôi</h2>

        <div th:if="${#lists.isEmpty(orders)}" style="text-align: center; padding: 60px 0; color: #999;">
            <div style="font-size: 50px;">📦</div>
            <p style="margin-top: 16px;">Bạn chưa có đơn hàng nào.</p>
            <a href="/" class="btn-checkout" style="display: inline-block; margin-top: 16px; padding: 12px 30px;">
                Mua ngay
            </a>
        </div>

        <div th:each="order : ${orders}" class="order-card">
            <div class="order-header">
                <div>
                    <strong th:text="'Đơn #' + ${order.id}"></strong>
                    <span style="color: #999; font-size: 13px; margin-left: 10px;"
                        th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                </div>
                <span class="badge" th:classappend="'badge-' + ${order.status}" th:text="${order.status}">
                </span>
            </div>

            <div style="font-size: 14px; color: #555; margin-bottom: 10px;">
                🏠 <span th:text="${order.shippingAddress}"></span>
            </div>

            <div class="order-items">
                <div th:each="item : ${order.items}" class="order-item-row">
                    <span th:text="${item.productName} + ' × ' + ${item.quantity}"></span>
                    <span
                        th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' JPY'"
                        style="color: #e84118; font-weight: bold;"></span>
                </div>
            </div>

            <div style="text-align: right; margin-top: 12px; font-size: 16px; font-weight: bold;">
                Tổng: <span style="color: #e84118;"
                    th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' JPY'">
                </span>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast-container" th:if="${toast}">
        <div class="toast" th:text="${toast}"></div>
    </div>
    <script>
        // Auto-remove toast sau 3.2s
        setTimeout(() => {
            document.querySelectorAll('.toast').forEach(t => t.remove());
        }, 3200);
    </script>

    <footer>
        <div th:text="${shopname}" style="font-weight: bold; font-size: 20px;"></div>
        <div class="footer-address" th:text="${address}"></div>
    </footer>
</body>

</html>
