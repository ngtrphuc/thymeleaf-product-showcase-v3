<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .profile-layout {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .profile-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.07);
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #000;
            border-left: 4px solid #e84118;
            padding-left: 12px;
            margin-bottom: 20px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .info-group label {
            display: block;
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .info-group input {
            width: 100%;
            padding: 10px 13px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .info-group input:focus {
            border-color: #e84118;
            outline: none;
        }

        .info-group.full {
            grid-column: 1 / -1;
        }

        .btn-save {
            background: #000;
            color: white;
            border: none;
            padding: 11px 28px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
            margin-top: 8px;
        }

        .btn-save:hover {
            background: #e84118;
        }

        .order-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .order-row:last-child {
            border-bottom: none;
        }

        .badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-pending {
            background: #fef9c3;
            color: #854d0e;
        }

        .badge-processing {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-shipped {
            background: #dcfce7;
            color: #166534;
        }

        .badge-delivered {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-cancelled {
            background: #fee2e2;
            color: #991b1b;
        }

        .cart-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        .cart-row:last-child {
            border-bottom: none;
        }

        .empty-msg {
            color: #999;
            font-size: 14px;
            text-align: center;
            padding: 20px 0;
        }

        @media (max-width: 600px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <a href="/" class="logo">🏠︎ HOME</a>
        <div style="display: flex; align-items: center; gap: 15px;"> <a sec:authorize="isAuthenticated()"
                href="/profile" class="btn-header">
                👤 <span sec:authentication="name"></span>
            </a>

            <a sec:authorize="isAuthenticated()" href="/my-orders" class="btn-header">📋 Orders</a>

            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn-header">🚪 Log Out</button>
            </form>

            <a sec:authorize="!isAuthenticated()" href="/login" class="btn-header">🔑 Log In</a>

            <a sec:authorize="hasRole('ADMIN')" href="/admin" class="btn-header" style="color:#f39c12;">⚙ Admin</a>

            <a href="/cart" class="btn-header">
                🛒 Cart (<span th:text="${session.cartCount != null ? session.cartCount : 0}">0</span>)
            </a>
        </div>
    </div>

    <div class="profile-layout">
        <h2 style="margin-bottom: 20px;">👤 My Profile</h2>

        <div class="profile-card">
            <div class="section-title">Account Information</div>
            <form th:action="@{/profile/update}" method="post">
                <div class="info-grid">
                    <div class="info-group">
                        <label>Full Name</label>
                        <input type="text" name="fullName" th:value="${user.fullName}" required minlength="2">
                    </div>
                    <div class="info-group">
                        <label>Email</label>
                        <input type="email" th:value="${user.email}" disabled style="background:#f5f5f5; color:#999;">
                    </div>
                    <div class="info-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phoneNumber" th:value="${user.phoneNumber}"
                            placeholder="e.g. 08012345678">
                    </div>
                    <div class="info-group full">
                        <label>Default Shipping Address</label>
                        <input type="text" name="defaultAddress" th:value="${user.defaultAddress}"
                            placeholder="Street, City...">
                    </div>
                </div>
                <button type="submit" class="btn-save">Save Changes</button>
            </form>
        </div>

        <div class="profile-card">
            <div class="section-title">📦 Pending Orders</div>
            <div th:if="${#lists.isEmpty(pendingOrders)}" class="empty-msg">No pending orders.</div>
            <div th:each="order : ${pendingOrders}" class="order-row">
                <div>
                    <strong th:text="'#' + ${order.id}"></strong>
                    <span style="color:#999; font-size:12px; margin-left:8px;"
                        th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy')}"></span>
                </div>
                <span class="badge" th:classappend="'badge-' + ${order.status}" th:text="${order.status}"></span>
                <span style="color:#e84118; font-weight:bold;"
                    th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' JPY'"></span>
            </div>
        </div>

        <div class="profile-card">
            <div class="section-title">✅ Delivered Orders</div>
            <div th:if="${#lists.isEmpty(deliveredOrders)}" class="empty-msg">No delivered orders yet.</div>
            <div th:each="order : ${deliveredOrders}" class="order-row">
                <div>
                    <strong th:text="'#' + ${order.id}"></strong>
                    <span style="color:#999; font-size:12px; margin-left:8px;"
                        th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy')}"></span>
                </div>
                <span class="badge badge-delivered">delivered</span>
                <span style="color:#e84118; font-weight:bold;"
                    th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' JPY'"></span>
            </div>
        </div>

        <div class="profile-card">
            <div class="section-title">🛒 Items in Cart</div>
            <div th:if="${#lists.isEmpty(cartItems)}" class="empty-msg">Your cart is empty.</div>
            <div th:each="item : ${cartItems}" class="cart-row">
                <span th:text="${item.name}"></span>
                <span style="color:#999;">x<span th:text="${item.quantity}"></span></span>
                <span style="color:#e84118; font-weight:bold;"
                    th:text="${#numbers.formatDecimal(item.price * item.quantity,0,'COMMA',0,'POINT')} + ' JPY'"></span>
            </div>
            <div th:if="${!#lists.isEmpty(cartItems)}" style="text-align:right; margin-top:12px;">
                <a href="/cart" class="btn-save" style="display:inline-block; text-decoration:none;">Go to Cart →</a>
            </div>
        </div>
    </div>

    <div class="toast-container" th:if="${toast}">
        <div class="toast" th:text="${toast}"></div>
    </div>
    <script>
        setTimeout(() => {
            document.querySelectorAll('.toast').forEach(t => t.remove());
        }, 3200);
    </script>

    <footer>
        <div th:text="${shopname}" style="font-weight:bold; font-size:20px;"></div>
        <div class="footer-address" th:text="${address}"></div>
        <div style="margin-top:10px; font-size:11px; opacity:0.4;">© 2026 Smartphone Shop</div>
    </footer>
</body>

</html>
