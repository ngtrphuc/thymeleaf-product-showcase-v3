<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Shipping Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-group {
            margin-bottom: 20px;
            text-align: left;
            max-width: 440px;
            margin-left: auto;
            margin-right: auto;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            transition: 0.3s;
            font-size: 14px;
        }

        .form-group input:focus {
            border-color: #e84118;
            outline: none;
        }

        .option-card {
            max-width: 440px;
            margin: 0 auto 16px;
            padding: 16px 20px;
            border: 2px solid #ddd;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option-card:has(input:checked) {
            border-color: #e84118;
            background: #fff8f6;
        }

        .option-card input[type="radio"] {
            accent-color: #e84118;
            width: 16px;
            height: 16px;
        }

        #newAddressFields {
            display: none;
        }
    </style>
</head>

<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="/cart" class="btn-header">
                ◀ Back to Cart
            </a>
        </div>
        <span style="color:white;">Checkout Step 1 of 2</span>
    </div>

    <div class="container">
        <h2 style="text-align:center; margin-bottom:30px;">Shipping Details</h2>

        <form th:action="@{/cart/process-shipping}" method="post" style="text-align:center;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="customerName" th:value="${user != null ? user.fullName : ''}"
                    placeholder="e.g. John Doe" required minlength="2">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phoneNumber" th:value="${user != null ? user.phoneNumber : ''}"
                    placeholder="e.g. 08012345678" required pattern="[0-9]{10,11}">
            </div>

            <div th:if="${user != null and user.defaultAddress != null and !#strings.isEmpty(user.defaultAddress)}"
                style="max-width:440px; margin:0 auto 20px;">
                <p style="font-weight:bold; text-align:left; margin-bottom:12px;">Shipping Address</p>

                <label class="option-card">
                    <input type="radio" name="addressOption" value="saved" checked onchange="toggleAddress(this.value)">
                    <div>
                        <div style="font-weight:bold; font-size:14px;">Use saved address</div>
                        <div style="color:#666; font-size:13px; margin-top:4px;" th:text="${user.defaultAddress}"></div>
                    </div>
                </label>

                <label class="option-card">
                    <input type="radio" name="addressOption" value="new" onchange="toggleAddress(this.value)">
                    <div style="font-weight:bold; font-size:14px;">Ship to a new address</div>
                </label>

                <input type="hidden" name="savedAddress" th:value="${user.defaultAddress}">
            </div>

            <div th:if="${user == null or user.defaultAddress == null or #strings.isEmpty(user.defaultAddress)}"
                class="form-group">
                <label>Shipping Address</label>
                <input type="text" name="address" placeholder="Street, City, Province..." required minlength="10">
            </div>

            <div id="newAddressFields" class="form-group">
                <label>New Shipping Address</label>
                <input type="text" id="newAddressInput" name="address" placeholder="Street, City, Province..."
                    minlength="10">
            </div>

            <button type="submit" class="btn-submit">Continue to Summary</button>
        </form>
    </div>

    <script>
        function toggleAddress(val) {
            const newFields = document.getElementById('newAddressFields');
            const newInput = document.getElementById('newAddressInput');
            if (val === 'new') {
                newFields.style.display = 'block';
                newInput.required = true;
            } else {
                newFields.style.display = 'none';
                newInput.required = false;
                newInput.value = '';
            }
        }
    </script>

    <div class="toast-container" th:if="${toast}">
        <div class="toast" th:text="${toast}"></div>
    </div>
    <script>
        setTimeout(() => {
            document.querySelectorAll('.toast').forEach(t => t.remove());
        }, 3200);
    </script>

    <footer>
        <div th:text="${shopname}" style="font-weight: bold; font-size: 20px;"></div>
        <div class="footer-address" th:text="${address}"></div>
    </footer>
</body>

</html>
