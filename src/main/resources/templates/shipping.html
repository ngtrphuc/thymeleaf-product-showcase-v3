<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Shipping Details - Smartphone Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-group {
            margin-bottom: 20px;
            text-align: left;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:invalid:focus {
            border-color: #e84118;
            box-shadow: 0 0 5px rgba(232, 65, 24, 0.2);
            outline: none;
        }

        input:valid:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 5px rgba(46, 204, 113, 0.2);
            outline: none;
        }

        .btn-submit {
            width: 100%;
            max-width: 400px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="header">
        <a href="/cart" style="color: white; text-decoration: none; font-weight: bold;">← Back to Cart</a>
        <span>Checkout Step 1 of 2</span>
    </div>

    <div class="container">
        <h2 style="text-align: center; margin-bottom: 30px; color: #000;">Shipping Details</h2>

        <form th:action="@{/cart/process-shipping}" method="post" style="text-align: center;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="customerName" placeholder="e.g. John Doe" required minlength="2"
                    title="Please enter your full name (at least 2 characters)">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phoneNumber" placeholder="e.g. 08012345678" required pattern="[0-9]{10,11}"
                    title="Phone number must be digits and between 10 to 11 characters">
            </div>

            <div class="form-group">
                <label>Shipping Address</label>
                <input type="text" name="address" placeholder="Street, City, Province..." required minlength="10"
                    title="Please enter a specific address for accurate delivery">
            </div>

            <button type="submit" class="btn-submit">Continue to Summary</button>
        </form>
    </div>

    <!-- Toast notification -->
    <div class="toast-container" th:if="${toast}">
        <div class="toast" th:text="${toast}"></div>
    </div>
    <script>
        // Auto-remove toast sau 3.2s
        setTimeout(() => {
            document.querySelectorAll('.toast').forEach(t => t.remove());
        }, 3200);
    </script>

    <footer style="margin-top: 50px;">
        <div th:text="${shopname}" style="font-weight: bold; font-size: 20px;"></div>
        <div class="footer-address" th:text="${address}"></div>
        <div style="margin-top: 10px; font-size: 11px; opacity: 0.4;">© 2026 Smartphone Shop - Secure Checkout</div>
    </footer>
</body>

</html>
